      const prev = history[history.length - 1];
      setHistory(h => h.slice(0, -1));
      setScreen(prev);

    setScreen(tab);
    setHistory([]);

               onClick={() => go('search')}>
            <span className="text-deep-300">🔍</span>
            <span className="flex-1 text-sm text-deep-300">搜索职位、企业、海域</span>
            <span className="text-ocean-600 text-xs">搜索</span>
          </div>
        </div>
        <div className="grid grid-cols-4 gap-2 px-5 mt-5 text-center">

        </div>
        <div className="mx-5 mt-5 rounded-2xl bg-gradient-to-r from-ocean-700 to-ocean-500 p-4 text-white clickable"
             onClick={() => go('profile')}>

                 onClick={n.action}>
              <div className="flex gap-3">
                <div className={`w-10 h-10 rounded-full bg-${n.color}-500 flex items-center justify-center text-white flex-shrink-0`}>{n.icon}</div>
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-1">
                    <p className="font-semibold text-sm">{n.title}</p>
                    {n.badge && <span className={`text-[10px] px-1.5 py-0.5 bg-${n.color}-500 text-white rounded`}>{n.badge}</span>}
                  </div>
                  <p className="text-sm text-deep-700 leading-relaxed">{n.desc}</p>
                  <p className="text-xs text-deep-400 mt-2">{n.time}</p>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const CompanyDetailScreen = selectedCompany && (
    <div className="screen active" key="companyDetail">
      <STATUS_BAR />
      <div className="bg-white overflow-y-auto" style={{height:'calc(100% - 44px)'}}>
        <div className="px-5 py-3 border-b border-deep-100 flex items-center gap-3">
          <button className="text-xl clickable" onClick={goBack}>←</button>
          <h2 className="text-base font-semibold flex-1">企业详情</h2>
        </div>
        <div className="bg-gradient-to-br from-ocean-700 to-ocean-900 p-5 text-white">
          <div className="flex items-start gap-3">
            <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-2xl">🏢</div>
            <div className="flex-1">
              <h3 className="text-lg font-bold">{selectedCompany.company}</h3>
              <p className="text-sm opacity-80 mt-1">浙江 · 舟山</p>
              <div className="flex items-center gap-2 mt-2">
                <span className="text-xs px-2 py-0.5 bg-amber-400 text-amber-900 rounded font-medium">{selectedCompany.grade} 认证</span>
                <span className="text-xs opacity-80">信用分 {selectedCompany.credit}</span>
              </div>
            </div>
          </div>
        </div>
        <div className="p-5 space-y-4">
          <div className="bg-white rounded-2xl p-4 border border-deep-200">
            <p className="text-sm font-semibold mb-3">企业信息</p>
            <div className="space-y-2 text-sm">
              <div className="flex justify-between"><span className="text-deep-500">企业类型</span><span>民营企业</span></div>
              <div className="flex justify-between"><span className="text-deep-500">成立时间</span><span>2008年</span></div>
              <div className="flex justify-between"><span className="text-deep-500">企业规模</span><span>100-500人</span></div>
              <div className="flex justify-between"><span className="text-deep-500">船队规模</span><span>12艘</span></div>
            </div>
          </div>
          <div className="bg-white rounded-2xl p-4 border border-deep-200">
            <p className="text-sm font-semibold mb-3">招聘统计</p>
            <div className="grid grid-cols-3 gap-3 text-center">
              <div><p className="text-2xl font-bold text-ocean-600">8</p><p className="text-xs text-deep-500 mt-1">在招职位</p></div>
              <div><p className="text-2xl font-bold text-ocean-600">156</p><p className="text-xs text-deep-500 mt-1">累计招聘</p></div>
              <div><p className="text-2xl font-bold text-ocean-600">4.2</p><p className="text-xs text-deep-500 mt-1">企业评分</p></div>
            </div>
          </div>
          <button className="w-full py-3 bg-ocean-600 text-white rounded-2xl text-sm font-medium clickable"
                  onClick={() => { setSelectedChat(MESSAGES[0]); go('chat'); }}>联系企业</button>
        </div>
      </div>
    </div>
  );

  const SettingsScreen = (
    <div className="screen active" key="settings">
      <STATUS_BAR />
      <div className="bg-deep-50 overflow-y-auto" style={{height:'calc(100% - 44px)'}}>
        <div className="bg-white px-5 py-3 border-b border-deep-100 flex items-center gap-3">
          <button className="text-xl clickable" onClick={goBack}>←</button>
          <h2 className="text-base font-semibold flex-1">设置</h2>
        </div>
        <div className="p-4 space-y-3 text-sm">
          <div className="bg-white rounded-2xl p-1">
            {['账号安全','隐私设置','消息通知','关于我们'].map((item, i, arr) => (
              <div key={item}
                   className={`flex items-center justify-between px-4 py-3.5 clickable ${i < arr.length - 1 ? 'border-b border-deep-100' : ''}`}
                   onClick={() => showToast(item)}>
                <span>{item}</span><span className="text-deep-300">›</span>
              </div>
            ))}
          </div>
          <div className="bg-white rounded-2xl p-1">
            {['用户协议','隐私政策','意见反馈'].map((item, i, arr) => (
              <div key={item}
                   className={`flex items-center justify-between px-4 py-3.5 clickable ${i < arr.length - 1 ? 'border-b border-deep-100' : ''}`}
                   onClick={() => showToast(item)}>
                <span>{item}</span><span className="text-deep-300">›</span>
              </div>
            ))}
          </div>
          <button className="w-full py-3 bg-white rounded-2xl text-rose-600 font-medium text-center clickable"
                  onClick={() => showToast('已退出登录')}>退出登录</button>
          <p className="text-center text-xs text-deep-400 mt-4">渔匠之光 v1.0.0</p>
        </div>
      </div>
    </div>
  );

  // ---- Screen Router ----
  const screens = {
    home: HomeScreen,
    jobList: JobListScreen,
    search: SearchScreen,
    jobDetail: JobDetailScreen,
    chatList: ChatListScreen,
    chat: ChatScreen,
    profile: ProfileScreen,
    resume: ResumeScreen,
    certs: CertsScreen,
    deliveries: DeliveriesScreen,
    deliveryDetail: DeliveryDetailScreen,
    notifications: NotificationsScreen,
    companyDetail: CompanyDetailScreen,
    settings: SettingsScreen,
  };

  const currentScreen = screens[screen];

  // ---- Bottom Sheets ----
  const deliverSheet = showDeliverSheet && selectedJob && (
    <div className="scrim" onClick={() => setShowDeliverSheet(false)}>
      <div className="bottom-sheet show" onClick={e => e.stopPropagation()}>
        <div className="w-12 h-1 bg-deep-300 rounded mx-auto mb-5"></div>
        <h3 className="text-lg font-semibold">确认投递这份工作</h3>
        <p className="text-xs text-deep-500 mt-1">企业将看到你的简历与证书</p>
        <div className="bg-ocean-50 rounded-2xl p-4 mt-5">
          <p className="font-semibold text-sm">{selectedJob.title} · {selectedJob.salary}</p>
          <p className="text-xs text-deep-500 mt-1">{selectedJob.company}</p>
        </div>
        <div className="mt-5">
          <p className="text-xs text-deep-500 mb-2">附言（选填）</p>
          <textarea className="w-full border border-deep-300 rounded-2xl p-3 text-sm h-20 outline-none"
                    placeholder="可附上你期望的入职时间...">本人有 8 年南海围网作业经验，证书齐全，可即时入职。</textarea>
        </div>
        <div className="bg-amber-50 rounded-xl p-3 mt-4 text-xs text-amber-900 flex gap-2">
          <span>💡</span><span>同一职位 24 小时内只可投递一次</span>
        </div>
        <button className="w-full mt-5 bg-ocean-600 text-white font-semibold py-3.5 rounded-2xl clickable"
                onClick={() => applyJob(selectedJob)}>确认投递</button>
        <button className="w-full mt-2 text-deep-500 py-3 text-sm clickable"
                onClick={() => setShowDeliverSheet(false)}>取消</button>
      </div>
    </div>
  );

  const interviewSheet = showInterviewSheet && (
    <div className="scrim" onClick={() => setShowInterviewSheet(false)}>
      <div className="bottom-sheet show" onClick={e => e.stopPropagation()}>
        <div className="w-12 h-1 bg-deep-300 rounded mx-auto mb-5"></div>
        <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 flex gap-3 mb-5">
          <span className="text-2xl">📅</span>
          <div className="flex-1">
            <p className="font-semibold text-amber-900">面试邀请</p>
            <p className="text-xs text-amber-800 mt-1">请在 24 小时内确认</p>
          </div>
        </div>
        <div className="bg-white rounded-2xl p-4 border border-deep-200 space-y-3">
          <div className="flex gap-3"><span className="text-deep-500 text-sm w-20">面试职位</span><span className="text-sm font-medium">轮机长</span></div>
          <div className="flex gap-3"><span className="text-deep-500 text-sm w-20">面试企业</span><span className="text-sm">福建闽南海运</span></div>
          <div className="flex gap-3"><span className="text-deep-500 text-sm w-20">面试方式</span><span className="text-sm">视频面试</span></div>
          <div className="flex gap-3"><span className="text-deep-500 text-sm w-20">面试时间</span><span className="text-sm font-medium text-ocean-600">明天 14:00</span></div>
        </div>
        <div className="flex gap-3 mt-5">
          <button className="flex-1 py-3 border border-deep-300 rounded-xl text-sm font-medium clickable"
                  onClick={() => { setShowInterviewSheet(false); showToast('已拒绝面试'); }}>拒绝</button>
          <button className="flex-1 py-3 bg-ocean-600 text-white rounded-xl text-sm font-medium clickable"
                  onClick={() => { setShowInterviewSheet(false); showToast('已确认面试，请准时参加'); }}>确认面试</button>
        </div>
      </div>
    </div>
  );

  const hireSheet = showHireSheet && (
    <div className="scrim" onClick={() => setShowHireSheet(false)}>
      <div className="bottom-sheet show" onClick={e => e.stopPropagation()} style={{maxHeight:'80vh',overflowY:'auto'}}>
        <div className="w-12 h-1 bg-deep-300 rounded mx-auto mb-5"></div>
        <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 flex gap-3 mb-5">
          <span className="text-2xl">🎉</span>
          <div className="flex-1">
            <p className="font-semibold text-emerald-900">恭喜！企业向您发出录用通知</p>
            <p className="text-xs text-emerald-800 mt-1">请在 48 小时内确认</p>
          </div>
        </div>
        <div className="bg-white rounded-2xl p-4 border border-deep-200 space-y-3 text-sm">
          <div className="flex gap-3"><span className="text-deep-500 w-20">录用职位</span><span className="font-medium">大副</span></div>
          <div className="flex gap-3"><span className="text-deep-500 w-20">录用企业</span><span>青岛海洋捕捞</span></div>
          <div className="flex gap-3"><span className="text-deep-500 w-20">约定薪资</span><span className="font-medium text-rose-600">14,000 元/月</span></div>
          <div className="flex gap-3"><span className="text-deep-500 w-20">上船时间</span><span className="font-medium">2026-05-20</span></div>
          <div className="flex gap-3"><span className="text-deep-500 w-20">合同周期</span><span>3 个月</span></div>
          <div className="flex gap-3"><span className="text-deep-500 w-20">工作海域</span><span>东海</span></div>
          <div className="flex gap-3"><span className="text-deep-500 w-20">出发港口</span><span>青岛港</span></div>
        </div>
        <div className="flex gap-2 flex-wrap mt-4 text-xs">
          {['包吃住','缴纳保险','高温津贴','节日福利'].map(b => (
            <span key={b} className="px-2 py-1 bg-emerald-50 text-emerald-700 rounded">{b}</span>
          ))}
        </div>
        <div className="bg-amber-50 rounded-xl p-3 text-xs text-amber-900 mt-4">
          <p className="font-medium mb-1">⚠️ 重要提示</p>
          <p>• 确认录用后，请按时到岗</p>
          <p>• 确认后 48 小时内未到岗将影响信用分</p>
        </div>
        <div className="flex gap-3 mt-5">
          <button className="flex-1 py-3 border border-deep-300 rounded-xl text-sm font-medium clickable"
                  onClick={() => { setShowHireSheet(false); showToast('已拒绝录用'); }}>拒绝录用</button>
          <button className="flex-1 py-3 bg-ocean-600 text-white rounded-xl text-sm font-medium clickable"
                  onClick={() => { setShowHireSheet(false); showToast('已确认录用！请按时到岗'); }}>确认录用</button>
        </div>
      </div>
    </div>
  );

  const filterSheet = showFilterSheet && (
    <div className="scrim" onClick={() => setShowFilterSheet(false)}>
      <div className="bottom-sheet show" onClick={e => e.stopPropagation()} style={{maxHeight:'80vh',overflowY:'auto'}}>
        <div className="w-12 h-1 bg-deep-300 rounded mx-auto mb-5"></div>
        <div className="flex items-center gap-3 mb-5">
          <button className="text-xl" onClick={() => setShowFilterSheet(false)}>✕</button>
          <h3 className="text-base font-semibold flex-1">筛选条件</h3>
          <button className="text-ocean-600 text-sm clickable" onClick={() => showToast('已重置')}>重置</button>
        </div>
        {[
          { title: '工作海域', options: ['东海','南海','黄海','渤海','远洋'], selected: [0,2] },
          { title: '船型', options: ['拖网','围网','流网','钓具','其他'], selected: [0] },
          { title: '薪资范围', options: ['5千以下','5千-1万','1万-2万','2万以上'], selected: [2] },
          { title: '出海周期', options: ['1个月内','1-3个月','3-6个月','6个月以上'], selected: [1] },
        ].map(group => (
          <div key={group.title} className="mb-5">
            <p className="text-sm font-semibold mb-3">{group.title}</p>
            <div className="flex gap-2 flex-wrap">
              {group.options.map((opt, i) => (
                <button key={opt}
                        className={`px-3 py-1.5 border rounded-lg text-xs ${group.selected.includes(i) ? 'border-ocean-500 bg-ocean-50 text-ocean-700' : 'border-deep-200 text-deep-600'}`}>
                  {opt}
                </button>
              ))}
            </div>
          </div>
        ))}
        <button className="w-full mt-3 bg-ocean-600 text-white font-semibold py-3.5 rounded-2xl clickable"
                onClick={() => { setShowFilterSheet(false); showToast('已应用筛选条件'); }}>确认筛选</button>
      </div>
    </div>
  );

  return (
    <div className="phone-shell">
      <div className="screen-container">
        {currentScreen}
      </div>
      {deliverSheet}
      {interviewSheet}
      {hireSheet}
      {filterSheet}
      <div className={`toast ${toastVisible ? 'show' : ''}`}>{toast}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
